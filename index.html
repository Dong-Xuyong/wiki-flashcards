<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f4ef" />
  <title>Wiki Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Encode+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="dong-ui/theme.js"></script>
  <link rel="stylesheet" href="dong-ui/theme.css" />
  <link rel="stylesheet" href="styles.css" />

</head>
<body>
  <div id="app">
    <header id="topbar">
      <button id="back-btn" class="icon-btn hidden" aria-label="Back">&#8592;</button>
      <h1 id="topbar-title">Wiki Flashcards</h1>
      <span id="topbar-meta"></span>
      <button type="button" data-dong-theme-toggle aria-label="Toggle color theme"></button>
    </header>

    <main id="view-root">
      <div id="loading">Loading concepts&hellip;</div>
    </main>

    <nav id="tabbar">
      <button data-tab="home" class="tab active"><span class="tab-icon">&#8962;</span>Home</button>
      <button data-tab="library" class="tab"><span class="tab-icon">&#9776;</span>Library</button>
      <button data-tab="study" class="tab"><span class="tab-icon">&#9889;</span>Study</button>
      <button data-tab="analytics" class="tab"><span class="tab-icon">&#9636;</span>Analytics</button>
    </nav>
  </div>
  <script src="analytics.js"></script>
  <script src="app.js"></script>
